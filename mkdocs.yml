site_name: Systèmes embarqués Reconfigurables
site_url: https://pjlapray.github.io/Site_web/
repo_url: https://github.com/pjlapray/Site_web
repo_name: "P-J. Lapray"
edit_uri: edit/main/docs/

theme:
  name: material
  language: fr
  logo: assets/logo.png
  favicon: assets/favicon.png
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - content.code.copy
  palette:
    - scheme: default
      primary: white
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Mode sombre
    - scheme: slate
      primary: grey
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Mode clair
  font:
    text: Roboto
    code: Roboto Mono

nav:
  - Accueil: index.md
  - "Electronique Numérique":
      - Introduction: en/intro.md
      - Logique Combinatoire: en/logique_combinatoire.md
      - Logique Séquentielle: en/logique_sequentielle.md
  - "Syst. Emb. Reconfig. 1":
      - Introduction VHDL: ser1/intro.md
  - "Syst. Emb. Reconfig. 2":
      - Introduction SoC-FPGA: ser2/intro.md

extra_css:
  - css/custom.css

extra_javascript:
  - https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.7/MathJax.js?config=TeX-MML-AM_CHTML

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.blocks.grid      # <--- AJOUTEZ CETTE LIGNE ICI
  - pymdownx.highlight:
      anchor_linenums: true
      pygments_lang_class: true
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.emoji:
      emoji_index: !!python/name:pymdownx.emoji.twemoji
      emoji_generator: !!python/name:pymdownx.emoji.to_svg