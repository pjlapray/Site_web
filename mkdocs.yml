# Informations générales du projet
site_name: Systèmes Embarqués Reconfigurables  # Nom affiché dans l'onglet du navigateur
site_url: https://pjlapray.github.io/Site_web/ # URL finale du site déployé
repo_url: https://github.com/pjlapray/Site_web # Lien vers ton dépôt source
repo_name: "P-J. Lapray"                       # Nom affiché pour le bouton GitHub
edit_uri: edit/main/docs/                       # Permet aux lecteurs de proposer des modifs via GitHub

# Configuration de l'apparence (Thème Material)
theme:
  name: material
  custom_dir: overrides       # Dossier contenant tes modifs HTML spécifiques (ex: footer)
  language: fr                # Traduit les boutons (Next, Previous, Search) en français
  logo: assets/logo.png       # Chemin de l'image du logo (en haut à gauche)
  favicon: assets/favicon.png # Petite icône affichée dans l'onglet du navigateur
  features:
    - navigation.tabs         # Menu principal sous forme d'onglets horizontaux en haut
    - navigation.tabs.sticky  # Garde les onglets visibles même quand on scroll
    - navigation.path         # Affiche le fil d'ariane (Breadcrumbs)
    - navigation.top          # Ajoute un bouton "Retour en haut de page"
    - search.suggest          # Suggestions automatiques dans la barre de recherche
    - content.code.copy       # Ajoute un bouton "Copier" sur tous les blocs de code
  palette:
    # Option 1 : Mode clair
    - scheme: default
      primary: white          # Couleur de la barre de navigation
      accent: blue            # Couleur des liens et boutons
      toggle:
        icon: material/brightness-7
        name: Mode sombre
    # Option 2 : Mode sombre
    - scheme: slate
      primary: grey
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Mode clair
  font:
    text: Roboto              # Police pour le texte général
    code: Roboto Mono         # Police pour les blocs de code (VHDL, C, etc.)

# Structure du menu de navigation
nav:
  - Accueil: index.md
  - "Électronique Numérique":
      - 1. Généralités: en/generalites.md
      - 2. Logique Combinatoire: 
          - 2.1 Composants Logiques Fondamentaux: en/logique_combinatoire.md
          - 2.2 Tableau de Karnaugh: en/tableau_de_karnaugh.md
      - 3. Logique Séquentielle: 
          - 3.1 Composants Logiques Fondamentaux: en/logique_sequentielle.md
          - 3.2 Métastabilité: en/metastabilite.md
  # (Même logique de numérotation manuelle pour les autres onglets...)

# Fichiers de styles personnalisés
extra_css:
  - css/custom.css            # Ton fichier pour la taille du logo, correctifs WaveDrom, etc.

# Scripts externes chargés par le navigateur
extra_javascript:
  # Rendu des formules mathématiques (LaTeX)
  - https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.7/MathJax.js?config=TeX-MML-AM_CHTML
  # NOTE : Si tu utilises l'extension Python markdown_wavedrom, tu peux supprimer les lignes ci-dessous
  - https://cdnjs.cloudflare.com/ajax/libs/wavedrom/2.6.8/wavedrom.min.js
  - https://cdnjs.cloudflare.com/ajax/libs/wavedrom/2.6.8/skins/default.js
  - js/wavedrom_loader.js

# Extensions de rendu Markdown (Logiciel de transformation)
markdown_extensions:
  - attr_list                 # Permet d'ajouter des classes CSS aux images/textes : { .ma-classe }
  - md_in_html                # Permet d'écrire du Markdown à l'intérieur de balises HTML <div>
  - admonition                # Support des blocs d'info : !!! info "Titre"
  - pymdownx.details          # Support des blocs repliables : ??? note "Cliquez ici"
  - pymdownx.superfences      # Indispensable pour imbriquer du code dans des listes ou admonitions
  - pymdownx.highlight:       # Coloration syntaxique du code
      anchor_linenums: true   # Permet de créer des liens vers une ligne précise
      pygments_lang_class: true
  - toc:                      # Table des matières (à droite)
      permalink: true         # Ajoute l'icône 🔗 à côté de chaque titre
  - pymdownx.arithmatex:      # Lien entre ton Markdown et MathJax (équations)
      generic: true
  - pymdownx.emoji:           # Support des emojis :smile:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tabbed:          # Support des onglets de contenu : === "VHDL"
      alternate_style: true
  - markdown_wavedrom         # Extension Python pour générer les chronogrammes au build (serveur)

# Paramètres additionnels
extra:
  generator: false            # Retire la mention "Made with MkDocs" en bas de page