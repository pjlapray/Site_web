site_name: Systèmes Embarqués Reconfigurables
site_url: https://pjlapray.github.io/Site_web/
repo_url: https://github.com/pjlapray/Site_web
repo_name: "P-J. Lapray"
edit_uri: edit/main/docs/

theme:
  name: material
  custom_dir: overrides    # <--- AJOUTEZ CETTE LIGNE
  language: fr
  logo: assets/logo.png
  favicon: assets/favicon.png
  features:
    - navigation.tabs          # Garde les onglets en haut
    - navigation.tabs.sticky   # Optionnel : fixe les onglets au défilement
    #- navigation.sections      # RECOMMANDÉ : Groupe les éléments par sections dans le menu gauche
    #- navigation.expand        # Affiche toute la hiérarchie (retraits) par défaut
    - navigation.path          # Affiche le chemin de navigation (fil d'Ariane)
    - navigation.top
    - search.suggest
    - content.code.copy
  palette:
    - scheme: default
      primary: white
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Mode sombre
    - scheme: slate
      primary: grey
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Mode clair
  font:
    text: Roboto
    code: Roboto Mono

nav:
  - Accueil: index.md
  - "Électronique Numérique":
      - Introduction: en/intro.md
      - Logique Combinatoire: 
          - Présentation: en/logique_combinatoire.md
          - Tableau de Karnaugh: en/tableau_de_karnagh.md
      - Logique Séquentielle: en/logique_sequentielle.md
  - "Syst. Emb. Reconfig. 1":
      - FPGA : ser1/fpga.md
      - VHDL: ser1/vhdl.md
      - Simulation VHDL: ser1/simulation.md
      - Synthèse et Implémentation: ser1/synthese.md
      - Affectation des broches: ser1/broches.md
  - "Syst. Emb. Reconfig. 2":
      - SoC-FPGA: ser2/intro.md
      - Interfaçage SoC et FPGA: ser2/interfacage.md
      - Plateform Designer: ser2/plateform_designer.md
      - CPUlator: ser2/cpulator.md
      
extra_css:
  - css/custom.css

extra_javascript:
  - https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.7/MathJax.js?config=TeX-MML-AM_CHTML

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      pygments_lang_class: true
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      
extra:
  generator: false  # <--- SUPPRIME la mention "Made with Material for MkDocs"