site_name: Architecture Numérique et VHDL
site_url: https://pjlapray.github.io/Site_web/
repo_url: https://github.com/pjlapray/Site_web
repo_name: pjlapray/Site_web
edit_uri: edit/main/docs/

theme:
  name: material
  language: fr
  features:
    - navigation.sections    # Garde les titres de sections en gras
    - navigation.expand      # Optionnel : affiche tout par défaut
    - navigation.top
    - search.suggest
    - content.code.copy
    
  palette:
    - scheme: default
      primary: white
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Mode sombre
    - scheme: slate
      primary: grey
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Mode clair

  font:
    text: Roboto
    code: Roboto Mono

# Définition de la structure des menus avec sous-parties
nav:
  - Accueil: index.md
  - "COURS THÉORIQUES":
      - Introduction: cours/intro.md
  - "TRAVAUX PRATIQUES":
      - Introduction: tp/intro.md
  - Ressources:
      - Guide Diagnostic: tuto/intro.md

extra_css:
  - https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css
  - css/custom.css  # On va créer ce fichier pour masquer le nom

extra_javascript:
  - https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.7/MathJax.js?config=TeX-MML-AM_CHTML

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      pygments_lang_class: true
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
  - admonition
  - pymdownx.details
  - toc:
      permalink: true