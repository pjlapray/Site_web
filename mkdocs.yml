site_name: Systèmes Embarqués Reconfigurables
site_url: https://pjlapray.github.io/Site_web/
repo_url: https://github.com/pjlapray/Site_web
repo_name: "P-J. Lapray"
edit_uri: edit/main/docs/

theme:
  name: material
  custom_dir: overrides
  language: fr
  logo: assets/logo.png
  favicon: assets/favicon.png
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.path
    - navigation.top
    - search.suggest
    - content.code.copy
  palette:
    - scheme: default
      primary: white
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Mode sombre
    - scheme: slate
      primary: grey
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Mode clair
  font:
    text: Roboto
    code: Roboto Mono

nav:
  - Accueil: index.md
  - "Électronique Numérique":
      - Généralités: en/generalites.md
      - Logique Combinatoire: 
          - Composants Logiques Fondamentaux: en/logique_combinatoire.md
          - Tableau de Karnaugh: en/tableau_de_karnaugh.md
      - Logique Séquentielle: 
          - Composants Logiques Fondamentaux: en/logique_sequentielle.md
          - Métastabilité: en/metastabilite.md

  - "Syst. Emb. Reconfig. 1":
      - FPGA : ser1/fpga.md
      - VHDL: ser1/vhdl.md
      - Simulation VHDL: ser1/simulation.md
      - Synthèse et Implémentation:
          - Synthèse: ser1/synthese.md
          - Affectation des broches: ser1/brochage.md
          - Implémentation: ser1/implementation.md
          - Configuration du FPGA: ser1/configuration.md
  - "Syst. Emb. Reconfig. 2":
      - SoC-FPGA: ser2/soc_fpga.md
      - Interfaçage SoC et FPGA: ser2/interfacage.md
      - Platform Designer: ser2/platform_designer.md
      - CPUlator: ser2/cpulator.md

extra_css:
  - css/custom.css

extra_javascript:
  - https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.7/MathJax.js?config=TeX-MML-AM_CHTML
  - https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.7/MathJax.js?config=TeX-MML-AM_CHTML
  - https://cdnjs.cloudflare.com/ajax/libs/wavedrom/2.6.8/wavedrom.min.js
  - https://cdnjs.cloudflare.com/ajax/libs/wavedrom/2.6.8/skins/default.js
  - js/wavedrom_loader.js

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  - markdown_wavedrom
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      pygments_lang_class: true
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tabbed:
      alternate_style: true

extra:
  generator: false