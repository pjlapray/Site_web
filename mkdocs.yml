site_name: Architecture Numérique et VHDL
site_url: https://pjlapray.github.io/Site_web/
repo_url: https://github.com/pjlapray/Site_web
repo_name: pjlapray/Site_web
edit_uri: edit/main/docs/

theme:
  name: material
  language: fr
  # LE LOGO SE PLACE ICI (sous theme)
  logo: material/cpu 
  icon:
    logo: material/memory # Une puce mémoire/processeur
  
  features:
    - navigation.tabs      
    - navigation.sections  
    - navigation.expand    
    - navigation.top       
    - search.suggest
    - content.code.copy    
    
  palette:
    - scheme: default
      primary: white
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Mode sombre
    - scheme: slate
      primary: grey
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Mode clair

  font:
    text: Roboto
    code: Roboto Mono

# Structure de navigation
nav:
  - Accueil: index.md
  - "Electronique Numérique":
      - Introduction: en/intro.md
      - Logique Combinatoire: en/logique_combinatoire.md
      - Logique Séquentielle: en/logique_sequentielle.md
  - "Syst. Emb. Reconfig. 1":
      - Introduction VHDL: ser1/intro.md
  - "Syst. Emb. Reconfig. 2":
      - Introduction SoC-FPGA: ser2/intro.md

extra_css:
  - css/custom.css

extra_javascript:
  - https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.7/MathJax.js?config=TeX-MML-AM_CHTML

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      pygments_lang_class: true
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
  - admonition
  - pymdownx.details
  - toc:
      permalink: true
